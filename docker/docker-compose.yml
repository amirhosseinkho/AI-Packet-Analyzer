version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-packet_analyzer}
      POSTGRES_USER: ${POSTGRES_USER:-analyzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analyzer_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-analyzer}:${POSTGRES_PASSWORD:-analyzer_secret}@db:5432/${POSTGRES_DB:-packet_analyzer}
    volumes:
      - ../backend:/app
      - packet_models:/app/models
      - packet_reports:/app/reports
    ports:
      - "8000:8000"
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000

  # ── Ollama (local LLM) ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres_data:
  packet_models:
  packet_reports:
  ollama_models:
